amcl:
  ros__parameters:
    use_sim_time: true

controller_server:
  ros__parameters:
    use_sim_time: true

planner_server:
  ros__parameters:
    use_sim_time: true

bt_navigator:
  ros__parameters:
    use_sim_time: true

global_costmap:
  global_costmap:
    ros__parameters:
      inflation_layer:
        inflation_radius: 0.25
        cost_scaling_factor: 3.0

local_costmap:
  local_costmap:
    ros__parameters:
      inflation_layer:
        inflation_radius: 0.20
        cost_scaling_factor: 2.0

goal_checker:
  ros__parameters:
    xy_goal_tolerance: 0.3
    yaw_goal_tolerance: 0.3